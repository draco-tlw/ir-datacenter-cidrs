name: BGP CIDR Extractor

on:
  workflow_dispatch:

jobs:
  extract-ips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run CIDR Extractor Script
        run: python main.py

      - name: Upload CIDR List Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Optimized-CIDRs
          path: target_cidrs_optimized.txt
          retention-days: 7
